<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#020617" />
    <title>TON Rewards App</title>

    <script src="https://adsgram.ai/js/adsgram-ad-sdk.js"></script>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        background-color: #020617;
        color: white;
        text-align: center;
      }
      #root {
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 80vh;
      }
      .btn-ad {
        background-color: #fbbf24;
        color: #020617;
        border: none;
        padding: 15px 30px;
        font-size: 18px;
        font-weight: bold;
        border-radius: 50px;
        cursor: pointer;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    
    <div id="root">
        <h2>Welcome to Easy TON Free</h2>
        <p>Watch Ads to Earn Rewards!</p>
        
        <button class="btn-ad" onclick="showAd()">Watch Ad to Earn</button>
    </div>

    <script>
      // 1. Adsgram ကို Setup လုပ်ခြင်း
      // "26715" ဆိုတဲ့နေရာမှာ Bro ရဲ့ Block ID အစစ်ကို ပြောင်းထည့်ပေးပါ
      const AdController = window.Adsgram.init({ blockId: "26715" });

      // 2. ကြော်ငြာပြမည့် Function
      function showAd() {
        AdController.show().then((result) => {
          // ကြော်ငြာကြည့်ပြီးသွားရင် ဖြစ်မယ့်အလုပ်
          alert("Congrats! You earned TON reward.");
        }).catch((result) => {
          // ကြော်ငြာပြလို့မရရင် ဖြစ်မယ့်အလုပ်
          alert("Ad not available. Try again later.");
          console.error(result);
        });
      }

      // Telegram WebApp အဆင်သင့်ဖြစ်အောင်လုပ်ခြင်း
      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
      }
    </script>
  </body>
</html>
