<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#facc15" />
    <title>Easy TON App</title>
    
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
      body { margin: 0; background-color: #facc15; font-family: sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
      * { box-sizing: border-box; }
      #root:empty { display: flex; justify-content: center; align-items: center; height: 100vh; font-weight: 900; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if (window.Telegram && window.Telegram.WebApp) {
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#facc15');
        tg.setBackgroundColor('#facc15');
      }
    </script>
  </body>
</html>
