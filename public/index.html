<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#facc15" />
    <title>Easy TON App</title>
    
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #facc15; 
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent; /* ဖုန်းမှာ ခလုတ်နှိပ်ရင် အပြာကွက် မပေါ်အောင် */
      }
      #root {
        min-height: 100vh;
      }
      
      /* တကယ်လို့ App က Telegram ထဲမှာ ပွင့်လာရင် စာသားတွေ Select ပေးလို့မရအောင် လုပ်ထားတာပါ */
      * {
        user-select: none;
        -webkit-user-select: none;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
