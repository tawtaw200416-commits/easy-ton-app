<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <meta name="theme-color" content="#facc15" />
    
    <title>Easy TON App</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://adsgram.ai/sdk-v1.js"></script>

    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #facc15; /* သင့် App ရဲ့ အဝါရောင် background */
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-tap-highlight-color: transparent;
        overflow-x: hidden;
      }

      /* User က စာတွေကို ဖိရွေးတာမျိုး (Copy ကူးတာမျိုး) မလုပ်နိုင်အောင် ပိတ်ခြင်း */
      * { 
        box-sizing: border-box; 
        user-select: none; 
        -webkit-user-select: none;
      }

      /* App Loading ဖြစ်နေစဉ်မှာ အဖြူရောင်ကြီး မပေါ်နေစေရန် */
      #root:empty {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #facc15;
      }

      /* Loading စာသားအတွက် style */
      #root:empty::after {
        content: "LOADING...";
        font-weight: 900;
        color: #000;
        letter-spacing: 2px;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <div id="root"></div>

    <script>
      // Telegram Web App ကို စတင်ဖွင့်လှစ်ခြင်း
      if (window.Telegram && window.Telegram.WebApp) {
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Screen အပြည့် ချဲ့လိုက်ခြင်း
      }
    </script>
  </body>
</html>
